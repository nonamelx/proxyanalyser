<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>proxy_analyser</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
            background-color: #050505;
            color: #cccccc;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .terminal {
            width: 100%;
            max-width: 860px;
            border: 1px solid #333;
            background: #0a0a0a;
        }

        .terminal-bar {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            background: #333;
        }

        .terminal-dot.red { background: #e53935; }

        .terminal-title {
            color: #666;
            font-size: 12px;
            margin-left: 8px;
            letter-spacing: 0.5px;
        }

        .terminal-body {
            padding: 24px 28px;
        }

        .prompt-line {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
        }

        .prompt-line .user {
            color: #e53935;
        }

        .prompt-line .path {
            color: #888;
        }

        .prompt-line .cursor {
            display: inline-block;
            width: 8px;
            height: 14px;
            background: #e53935;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .label {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: #080808;
            border: 1px solid #333;
            color: #cccccc;
            padding: 14px;
            font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
            font-size: 13px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #e53935;
        }

        textarea::placeholder {
            color: #333;
        }

        .btn {
            background: transparent;
            color: #cccccc;
            border: 1px solid #e53935;
            padding: 12px 28px;
            font-size: 13px;
            font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #e53935;
            color: #050505;
        }

        .btn:active {
            transform: scale(0.995);
        }

        .output-container {
            display: none;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        .output-container.active {
            display: block;
        }

        .output-area {
            width: 100%;
            height: 260px;
            background: #050505;
            border: 1px solid #333;
            color: #cccccc;
            padding: 14px;
            font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
            font-size: 12px;
            box-sizing: border-box;
            resize: vertical;
            margin-bottom: 12px;
        }

        .copy-btn {
            background: transparent;
            color: #cccccc;
            border: 1px solid #333;
            padding: 10px 20px;
            font-size: 12px;
            font-family: "Fira Code", "Cascadia Code", "JetBrains Mono", monospace;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .copy-btn:hover {
            border-color: #e53935;
            color: #e53935;
        }

        .error {
            border: 1px solid #e53935;
            color: #e53935;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            background: #e5393508;
        }

        .status {
            font-size: 12px;
            color: #888;
            margin-bottom: 16px;
            padding: 8px 12px;
            border: 1px solid #222;
            display: none;
        }

        .status.active {
            display: block;
        }

        .status .highlight {
            color: #e53935;
        }

        .badge {
            display: inline-block;
            border: 1px solid #333;
            color: #666;
            font-size: 10px;
            padding: 2px 7px;
            margin-left: 4px;
            letter-spacing: 0.5px;
        }

        .footer {
            margin-top: 20px;
            font-size: 11px;
            color: #333;
            text-align: center;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="terminal">
    <div class="terminal-bar">
        <span class="terminal-dot"></span>
        <span class="terminal-dot"></span>
        <span class="terminal-dot red"></span>
        <span class="terminal-title">~/proxy_analyser</span>
    </div>
    <div class="terminal-body">
        <div class="prompt-line">
            <span class="user">┌──(root)</span>-<span class="path">(~/proxy_analyser)</span>
            <br>
            <span class="user">└─$</span> ./compile <span class="path">--extract --clean</span><span class="cursor"></span>
        </div>

        <div class="label"># input</div>
        <textarea id="inputConfig" placeholder="vless:// trojan:// vmess:// ss:// wireguard://&#10;или YAML конфигурация..."></textarea>

        <button class="btn" id="processBtn" onclick="processConfiguration()">[ compile ]</button>

        <div id="errorMessage" class="error"></div>
        <div id="statusMessage" class="status"></div>

        <div id="outputSection" class="output-container">
            <div class="label"># output - clash config</div>
            <textarea class="output-area" id="outputConfig" readonly></textarea>
            <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">[ copy ]</button>
        </div>
    </div>
</div>

<div class="footer">dev by Marcus · <a href="https://t.me/meowpeow17" target="_blank" style="color:#555;text-decoration:none;">@meowpeow17</a></div>

<script>
    function processConfiguration() {
        const input = document.getElementById('inputConfig').value.trim();
        const errorDiv = document.getElementById('errorMessage');
        const statusDiv = document.getElementById('statusMessage');
        const outputSection = document.getElementById('outputSection');
        const outputArea = document.getElementById('outputConfig');

        errorDiv.style.display = 'none';
        statusDiv.classList.remove('active');
        outputSection.classList.remove('active');

        if (!input) {
            showError('# error: input is empty');
            return;
        }

        try {
            const lines = input.split('\n').map(l => l.trim()).filter(l => l);
            const firstLine = lines[0] || '';

            let proxies;

            if (/^(vless|trojan|vmess|ss|wireguard):\/\//.test(firstLine)) {
                proxies = processLinks(lines, statusDiv);
            } else {
                const single = parseYaml(input);
                proxies = [single];
            }

            proxies.forEach(p => {
                p.username = cleanUsername(p.username || p.proxyName);
            });

            outputArea.value = generateConfig(proxies);
            outputSection.classList.add('active');
        } catch (e) {
            showError('# error: ' + e.message);
        }
    }

    function processLinks(lines, statusDiv) {
        const parsed = [];

        for (const line of lines) {
            try {
                if (line.startsWith('vless://')) {
                    parsed.push(parseVless(line));
                } else if (line.startsWith('trojan://')) {
                    parsed.push(parseTrojan(line));
                }
            } catch (_) {}
        }

        if (parsed.length === 0) {
            throw new Error('no valid vless:// or trojan:// links found');
        }

        parsed.forEach((p, i) => {
            p.proxyName = p.tag || genName(p, i + 1);
        });

        if (statusDiv) {
            const skipped = lines.length - parsed.length;
            const names = parsed.map(p => p.proxyName).join(', ');
            statusDiv.innerHTML = '<span class="highlight">' + parsed.length + '</span> proxies' +
                (skipped ? ' · <span style="color:#555">' + skipped + ' skipped</span>' : '') +
                ' · ' + names;
            statusDiv.classList.add('active');
        }

        return parsed;
    }

    function genName(p, idx) {
        const num = String(idx).padStart(2, '0');
        if (p.security === 'reality') {
            if (p.network === 'tcp') return num + ' Reality TCP';
            return num + ' Reality ' + p.network.toUpperCase();
        }
        if (p.type === 'trojan') return num + ' Trojan';
        if (p.security === 'tls') return num + ' TLS ' + p.network.toUpperCase();
        return num + ' ' + p.type.toUpperCase();
    }

    function parseVless(input) {
        const uuidMatch = input.match(/vless:\/\/([^@]+)@/);
        const serverPortMatch = input.match(/@([^?]+)\?/);

        if (!uuidMatch || !serverPortMatch) {
            throw new Error('bad vless:// link');
        }

        const serverPort = serverPortMatch[1].split(':');
        const qs = input.split('?')[1] || '';
        const parts = qs.split('#');
        const params = new URLSearchParams(parts[0]);

        const security = params.get('security') || '';
        const network = params.get('type') || 'tcp';
        const tag = parts[1] ? decodeURIComponent(parts[1].trim()) : '';

        return {
            type: 'vless',
            uuid: uuidMatch[1].trim(),
            server: serverPort[0].trim(),
            port: serverPort[1].trim(),
            publicKey: params.get('public-key') || params.get('pbk') || '',
            shortId: params.get('short-id') || params.get('sid') || '',
            servername: params.get('sni') || '',
            security,
            network,
            flow: security === 'reality' ? 'xtls-rprx-vision' : '',
            fp: params.get('fp') || 'chrome',
            path: params.get('path') || '',
            host: params.get('host') || '',
            serviceName: params.get('serviceName') || params.get('service_name') || '',
            tag
        };
    }

    function parseTrojan(input) {
        const pwMatch = input.match(/trojan:\/\/([^@]+)@/);
        const serverPortMatch = input.match(/@([^?]+)\?/);

        if (!pwMatch || !serverPortMatch) {
            throw new Error('bad trojan:// link');
        }

        const serverPort = serverPortMatch[1].split(':');
        const qs = input.split('?')[1] || '';
        const parts = qs.split('#');
        const params = new URLSearchParams(parts[0]);

        const tag = parts[1] ? decodeURIComponent(parts[1].trim()) : '';

        return {
            type: 'trojan',
            password: pwMatch[1].trim(),
            server: serverPort[0].trim(),
            port: serverPort[1].trim(),
            sni: params.get('sni') || '',
            network: params.get('type') || 'tcp',
            security: params.get('security') || 'tls',
            path: params.get('path') || '',
            host: params.get('host') || '',
            tag
        };
    }

    function parseYaml(input) {
        const blocks = input.split(/^\s*-\s+/m);
        let foundBlock = null;
        let proxyType = '';

        for (let block of blocks) {
            const lower = block.toLowerCase();
            if (lower.includes('type: vless') || block.includes('VLESS')) {
                foundBlock = block;
                proxyType = 'vless';
                break;
            }
            if (lower.includes('type: trojan') || block.includes('Trojan')) {
                foundBlock = block;
                proxyType = 'trojan';
                break;
            }
        }

        if (!foundBlock) {
            throw new Error('no vless or trojan block in yaml');
        }

        const server = field(foundBlock, 'server');
        const port = field(foundBlock, 'port');
        if (!server || !port) throw new Error('missing server/port in yaml');

        const rawName = field(foundBlock, 'name') || 'proxy';
        const userExtract = rawName.match(/Marz\s*\(([^)]+)\)/);
        const username = userExtract ? userExtract[1].trim() : rawName;

        const result = {
            type: proxyType,
            server, port,
            network: field(foundBlock, 'network') || 'tcp',
            security: proxyType === 'vless' ? (field(foundBlock, 'security') || 'reality') : 'tls',
            proxyName: username
        };

        if (proxyType === 'vless') {
            result.uuid = field(foundBlock, 'uuid');
            if (!result.uuid) throw new Error('missing uuid in vless block');
            result.publicKey = field(foundBlock, 'public-key') || '';
            result.shortId = field(foundBlock, 'short-id') || '';
            result.servername = field(foundBlock, 'servername') || '';
            result.flow = field(foundBlock, 'flow') || (result.security === 'reality' ? 'xtls-rprx-vision' : '');
            result.fp = field(foundBlock, 'client-fingerprint') || 'chrome';
            result.path = field(foundBlock, 'path') || '';
            result.host = field(foundBlock, 'host') || '';
            result.serviceName = field(foundBlock, 'grpc-service-name') || '';
        } else {
            result.password = field(foundBlock, 'password') || '';
            result.sni = field(foundBlock, 'sni') || '';
            result.path = field(foundBlock, 'path') || '';
            result.host = field(foundBlock, 'host') || '';
        }

        return result;
    }

    function field(block, name) {
        const m = block.match(new RegExp(name + ':\\s*([^\\s\\n"\'\\s]+)'));
        return m ? m[1].trim() : '';
    }

    function cleanUsername(name) {
        return name
            .replace(/[\u{1F300}-\u{1F9FF}]/gu, '')
            .replace(/:[a-zA-Z0-9_]+:/g, '')
            .replace(/[:[\]()]/g, '')
            .trim();
    }

    function generateConfig(proxies) {
        const blocks = proxies.map(genProxyBlock).join('\n\n');
        const names = proxies.map(p => p.proxyName);

        return 'mode: Rule\n' +
'port: 7890\n' +
'\n' +
'proxies:\n' +
blocks +
'\n\n' +
'rules:\n' +
'  - PROCESS-NAME,prisma.exe,DIRECT\n' +
'  - PROCESS-NAME,Prisma.exe,DIRECT\n' +
'  - PROCESS-NAME,PRISMA.EXE,DIRECT\n' +
'  - PROCESS-NAME,Prisma Browser.exe,DIRECT\n' +
'  - PROCESS-NAME,prisma-browser.exe,DIRECT\n' +
'  - PROCESS-NAME,PrismaBrowser.exe,DIRECT\n' +
'  - MATCH,Proxy\n' +
'\n' +
'proxy-groups:\n' +
'  - name: Proxy\n' +
'    type: select\n' +
'    proxies:\n' +
'      - DIRECT\n' +
names.map(n => '      - "' + n + '"').join('\n');
    }

    function genProxyBlock(p) {
        if (p.type === 'trojan') {
            let lines = [
                '  - name: "' + p.proxyName + '"',
                '    type: trojan',
                '    server: ' + p.server,
                '    port: ' + p.port,
                '    password: ' + p.password,
                '    udp: true'
            ];
            if (p.sni) lines.push('    sni: ' + p.sni);
            if (p.network === 'ws') {
                lines.push('    network: ws');
                if (p.path || p.host) {
                    lines.push('    ws-opts:');
                    if (p.path) lines.push('      path: ' + p.path);
                    if (p.host) lines.push('      headers:\n        Host: ' + p.host);
                }
            }
            return lines.join('\n');
        }

        const isReality = !!(p.publicKey || p.shortId);

        let lines = [
            '  - client-fingerprint: ' + (p.fp || 'chrome')
        ];
        if (p.network === 'tcp' && isReality) {
            lines.push('    flow: xtls-rprx-vision');
        }
        lines.push('    name: "' + p.proxyName + '"');
        lines.push('    network: ' + p.network);
        lines.push('    port: ' + p.port);

        if (isReality) {
            lines.push('    reality-opts:');
            if (p.publicKey) lines.push('      public-key: ' + p.publicKey);
            if (p.shortId) lines.push('      short-id: ' + p.shortId);
        }

        lines.push('    server: ' + p.server);
        if (p.servername) lines.push('    servername: ' + p.servername);

        if (p.network === 'tcp') {
            lines.push('    tcp-opts:');
            lines.push('      ip-version: dual');
        }
        if (p.network === 'grpc' && p.serviceName) {
            lines.push('    grpc-opts:');
            lines.push('      grpc-service-name: ' + p.serviceName);
        }
        if (p.network === 'ws') {
            if (p.path || p.host) {
                lines.push('    ws-opts:');
                if (p.path) lines.push('      path: ' + p.path);
                if (p.host) lines.push('      headers:\n        Host: ' + p.host);
            }
        }

        lines = lines.concat([
            '    tls: true',
            '    type: vless',
            '    udp: true',
            '    uuid: ' + p.uuid
        ]);

        return lines.join('\n');
    }

    function showError(msg) {
        const el = document.getElementById('errorMessage');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function copyToClipboard() {
        const el = document.getElementById('outputConfig');
        el.select();
        document.execCommand('copy');
        const btn = document.getElementById('copyBtn');
        btn.textContent = '[ copied! ]';
        setTimeout(() => { btn.textContent = '[ copy ]'; }, 2000);
    }
</script>

</body>
